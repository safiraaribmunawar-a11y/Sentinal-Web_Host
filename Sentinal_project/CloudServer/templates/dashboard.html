<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Global Mesh | Blue Sector</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; background:#00020a; overflow:hidden; }
        #map { height: 100vh; width: 100vw; background: #00020a; }
        .hud { 
            position: absolute; z-index: 1000; background: rgba(0,10,30,0.9); 
            border: 1px solid #00d4ff; padding: 15px; font-family: 'Courier New', monospace;
            color: #00d4ff; top: 20px; left: 20px; width: 280px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        #status { font-size: 11px; color: #0088ff; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="hud">
        <h2 style="margin:0; font-size:16px;">GLOBAL MESH SYSTEM</h2>
        <div id="status">Scanning Deep Mesh...</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script>
        // Initialize Map with dark theme
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // Define the Heatmap Layer
        // Gradient: 0.0 is deep blue (base), 1.0 is bright red (high threat)
        let heat = L.heatLayer([], {
            radius: 35,
            blur: 20,
            maxZoom: 5,
            gradient: {
                0.0: '#001133', // Deep blue base
                0.2: '#0044ff', // Electric blue
                0.5: '#00ffcc', // Cyan
                0.8: '#ffff00', // Yellow
                1.0: '#ff0000'  // Red hit
            }
        }).addTo(map);

        async function sync() {
            try {
                const r = await fetch('/api/stats');
                const d = await r.json();
                
                // Format data for the heatmap: [lat, lon, intensity]
                let points = d.zones.map(z => [z.lat, z.lon, z.magnitude / 500]);
                
                // ADD A GLOBAL BLUE GLOW (Simulating the 'trillions of computers' mesh)
                // We add a few faint points around the world to keep it blue
                const globalMesh = [
                    [40, -100, 0.1], [51, 0, 0.1], [23, 90, 0.1], [-25, 133, 0.1], [35, 140, 0.1]
                ];
                
                heat.setLatLngs([...globalMesh, ...points]);
                document.getElementById('status').innerText = "MESH ONLINE | " + d.zones.length + " ACTIVE NODES";
            } catch(e) {
                document.getElementById('status').innerText = "LINK INTERRUPTED - RETRYING...";
            }
        }

        setInterval(sync, 3000);
        sync();
    </script>
</body>
</html>
