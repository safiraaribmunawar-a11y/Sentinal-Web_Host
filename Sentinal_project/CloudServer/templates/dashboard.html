<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Global Mesh | Weather Map Mode</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; background:#00020a; overflow:hidden; }
        #map { height: 100vh; width: 100vw; background: #00020a; }
        .hud { 
            position: absolute; z-index: 1000; background: rgba(0,10,30,0.9); 
            border: 1px solid #00d4ff; padding: 15px; font-family: monospace;
            color: #00d4ff; top: 20px; left: 20px; width: 260px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        .legend { top: auto; bottom: 30px; left: 20px; font-size: 11px; width: 230px; }
        .dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="hud">
        <h2 style="margin:0; font-size:14px;">SENTINEL GLOBAL MESH</h2>
        <div id="status" style="margin-top:10px; color:#0088ff;">SYSTEM FLUSH ACTIVE</div>
    </div>

    <div class="hud legend">
        <div style="margin-bottom:5px;"><span class="dot" style="background:#0044ff;"></span> &le; 50 (SECURE MESH)</div>
        <div style="margin-bottom:5px;"><span class="dot" style="background:#ffff00;"></span> 51-200 (ELEVATED)</div>
        <div><span class="dot" style="background:#ff0000;"></span> &gt; 200 (CRITICAL)</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // --- WEATHER MAP CONFIGURATION ---
        let heat = L.heatLayer([], {
            radius: 50,       // Large radius for blending
            blur: 35,         // High blur for "Weather Map" flush look
            maxZoom: 4,
            gradient: {
                0.2: '#0022ff', // Deep Blue
                0.4: '#0088ff', // Lighter Blue
                0.6: '#ffff00', // Yellow (Threat)
                1.0: '#ff0000'  // Red (Attack)
            }
        }).addTo(map);

        // CREATE A DENSE GRID FOR THE "FLUSH" LOOK
        function generateDenseGrid() {
            let grid = [];
            // Narrower steps (10 deg vs 20 deg) creates a solid sheet of color
            for (let lat = -60; lat <= 75; lat += 8) {
                for (let lon = -180; lon <= 180; lon += 12) {
                    grid.push([lat, lon, 0.2]); // 0.2 matches the blue gradient
                }
            }
            return grid;
        }

        const worldMeshBase = generateDenseGrid();

        async function sync() {
            try {
                const r = await fetch('/api/stats');
                const d = await r.json();
                
                let liveData = d.zones.map(z => {
                    let intensity = 0.2; // Base Blue
                    if (z.magnitude > 200) intensity = 1.0; 
                    else if (z.magnitude > 50) intensity = 0.6; 
                    return [z.lat, z.lon, intensity];
                });

                // Combine them
                heat.setLatLngs([...worldMeshBase, ...liveData]);
                document.getElementById('status').innerText = "MESH ONLINE | TOTAL COVERAGE";
            } catch(e) {
                document.getElementById('status').innerText = "LINK LOST";
            }
        }

        setInterval(sync, 4000);
        sync();
    </script>
</body>
</html>
