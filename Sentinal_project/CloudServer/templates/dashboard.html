<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Global Mesh | District-Wide Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; background:#00020a; overflow:hidden; }
        #map { height: 100vh; width: 100vw; background: #00020a; }
        
        /* HUD UI */
        .hud { 
            position: absolute; z-index: 1000; background: rgba(0,10,30,0.9); 
            border: 1px solid #00d4ff; padding: 15px; font-family: 'Courier New', monospace;
            color: #00d4ff; top: 20px; left: 20px; width: 280px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        .legend { top: auto; bottom: 30px; left: 20px; width: 220px; font-size: 11px; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>

    <div class="hud">
        <h2 style="margin:0; font-size:16px;">SENTINEL GLOBAL MESH</h2>
        <div id="status" style="margin-top:10px; color:#0088ff;">SYNCING GLOBAL SECTORS...</div>
    </div>

    <div class="hud legend">
        <div style="margin-bottom:8px;"><span class="status-dot" style="background:#0044ff;"></span> &le; 50 Attacks (STABLE)</div>
        <div style="margin-bottom:8px;"><span class="status-dot" style="background:#ffff00;"></span> 51-200 Attacks (ELEVATED)</div>
        <div><span class="status-dot" style="background:#ff0000;"></span> &gt; 200 Attacks (CRITICAL)</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // CONFIGURING THE BLUE -> YELLOW -> RED GRADIENT
        // 0.2 intensity is blue, 0.6 is yellow, 1.0 is red
        let heat = L.heatLayer([], {
            radius: 40,
            blur: 25,
            maxZoom: 5,
            gradient: {
                0.2: '#0044ff', // BLUE for low numbers
                0.6: '#ffff00', // YELLOW for medium
                1.0: '#ff0000'  // RED for high
            }
        }).addTo(map);

        // STATIC GHOST NODES: These keep the world blue by default
        const ghostNodes = [
            [40, -100, 0.1], [51, 0, 0.1], [23, 90, 0.1], [-25, 133, 0.1], 
            [35, 140, 0.1], [-15, -60, 0.1], [10, 20, 0.1]
        ];

        async function sync() {
            try {
                const r = await fetch('/api/stats');
                const d = await r.json();
                
                // Convert your attack counts (magnitude) into the 0.0 - 1.0 range for the heatmap
                let livePoints = d.zones.map(z => {
                    let intensity = 0.2; // Default blue
                    if (z.magnitude > 200) intensity = 1.0;      // Red
                    else if (z.magnitude > 50) intensity = 0.6;  // Yellow
                    
                    return [z.lat, z.lon, intensity];
                });
                
                heat.setLatLngs([...ghostNodes, ...livePoints]);
                document.getElementById('status').innerText = "MESH ACTIVE | " + d.zones.length + " GLOBAL HITS";
            } catch(e) {
                document.getElementById('status').innerText = "MESH OFFLINE - RECONNECTING...";
            }
        }

        setInterval(sync, 4000);
        sync();
    </script>
</body>
</html>
