<!DOCTYPE html>
<html>
<head>
    <title>Sentinel Global Mesh | Vector Radar</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin:0; padding:0; background:#00020a; overflow:hidden; }
        #map { height: 100vh; width: 100vw; background: #00020a; }
        .hud { 
            position: absolute; z-index: 1000; background: rgba(0,10,30,0.9); 
            border: 1px solid #00d4ff; padding: 15px; font-family: monospace;
            color: #00d4ff; top: 20px; left: 20px; width: 260px;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
        }
        .legend { top: auto; bottom: 30px; left: 20px; font-size: 11px; width: 230px; }
        .box { height: 12px; width: 12px; display: inline-block; margin-right: 10px; border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body>

    <div class="hud">
        <h2 style="margin:0; font-size:14px;">SENTINEL GLOBAL MESH</h2>
        <div id="status" style="margin-top:10px; color:#0088ff;">VECTOR SCAN ACTIVE</div>
    </div>

    <div class="hud legend">
        <div style="margin-bottom:5px;"><span class="box" style="background:#002244;"></span> &le; 50 (SECURE MESH)</div>
        <div style="margin-bottom:5px;"><span class="box" style="background:#ffff00;"></span> 51-200 (ELEVATED)</div>
        <div><span class="box" style="background:#ff0000;"></span> &gt; 200 (CRITICAL)</div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        
        let geojsonLayer;
        let attackData = {}; // Stores { "CountryName": magnitude }

        // 1. Function to determine color based on your specific rules
        function getColor(name) {
            let val = attackData[name] || 0;
            if (val > 200) return '#ff0000'; // RED
            if (val > 50)  return '#ffff00'; // YELLOW
            return '#002244';                // BLUE (Base)
        }

        function style(feature) {
            return {
                fillColor: getColor(feature.properties.name),
                weight: 1,
                opacity: 1,
                color: '#00d4ff', // Electric blue borders
                fillOpacity: 0.7
            };
        }

        // 2. Load World Borders (GeoJSON)
        // This file contains the shapes of all countries
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(res => res.json())
            .then(data => {
                geojsonLayer = L.geoJson(data, { style: style }).addTo(map);
            });

        // 3. Sync with your Render Server
        async function sync() {
            try {
                const r = await fetch('/api/stats');
                const d = await r.json();
                
                // Reset data
                attackData = {};
                
                // Map the hits from your EDR to specific areas
                // For this version, your 'app.py' should ideally send a 'country' field
                d.zones.forEach(z => {
                    // If you don't have country names, we'll simulate one for now
                    // In a real setup, your EDR would send "Bangladesh" or "USA"
                    if(z.lat > 20 && z.lat < 26 && z.lon > 88 && z.lon < 92) {
                        attackData["Bangladesh"] = z.magnitude;
                    }
                });

                if (geojsonLayer) geojsonLayer.setStyle(style);
                document.getElementById('status').innerText = "MESH ONLINE | DISTRICTS SECURE";
            } catch(e) {
                document.getElementById('status').innerText = "SYNC ERROR";
            }
        }

        setInterval(sync, 5000);
    </script>
</body>
</html>
